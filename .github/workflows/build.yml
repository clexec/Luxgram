name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (optional, default = commit count)'
        required: false
        default: ''

jobs:
  build:
    name: Build LuxGram IPA
    runs-on: macos-15

    env:
      HAS_CERT: ${{ secrets.CERTIFICATE_P12_BASE64 != '' }}

    steps:
      # 1 — Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2 — Xcode 16 ────────────────────────────────────────────────────────
      - name: Select Xcode 16
        run: |
          # Try 16.3 first, fall back to whatever is available
          if [ -d /Applications/Xcode_16.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          else
            sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer
          fi
          xcode-select -p
          xcodebuild -version

      # 3 — JDK 21 (Bazel needs it) ─────────────────────────────────────────
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # 4 — Import signing certificate (skip if secret not set) ─────────────
      - name: Import certificate
        if: ${{ secrets.CERTIFICATE_P12_BASE64 != '' }}
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD:   ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KP="$RUNNER_TEMP/build.keychain"
          KPW=$(openssl rand -base64 32)
          security create-keychain -p "$KPW" "$KP"
          security set-keychain-settings -lut 21600 "$KP"
          security unlock-keychain -p "$KPW" "$KP"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KP"
          security list-keychain -d user -s "$KP"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KPW" "$KP"
          echo "KEYCHAIN_PATH=$KP" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KPW" >> "$GITHUB_ENV"

      # 5 — Install provisioning profile (skip if secret not set) ──────────
      - name: Install provisioning profile
        if: ${{ secrets.PROVISIONING_PROFILE_BASE64 != '' }}
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > "$PP_DIR/LuxGram.mobileprovision"
          echo "Provisioning profile installed"

      # 6 — Write build config ──────────────────────────────────────────────
      - name: Write build configuration
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          TEAM="${APPLE_TEAM_ID:-YOUR_TEAM_ID}"
          python3 -c "
          import json, os
          cfg = {
            'bundle_id': 'app.luxgram.com',
            'api_id': '35971841',
            'api_hash': '504a05393f81633f94c433502e9b09e6',
            'team_id': os.environ.get('APPLE_TEAM_ID', 'YOUR_TEAM_ID'),
            'app_center_id': '0',
            'is_internal_build': 'false',
            'is_appstore_build': 'true',
            'appstore_id': '0',
            'app_specific_url_scheme': 'tg',
            'premium_iap_product_id': '',
            'enable_siri': False,
            'enable_icloud': False,
            'sg_config': ''
          }
          with open('build-system/ipa-build-configuration.json', 'w') as f:
            json.dump(cfg, f, indent='\t')
          print('Config written: bundle_id =', cfg['bundle_id'])
          "

      # 7 — Build IPA ───────────────────────────────────────────────────────
      - name: Build production IPA
        run: |
          INPUT_BN="${{ github.event.inputs.build_number }}"
          if [ -n "$INPUT_BN" ]; then
            BN="$INPUT_BN"
          else
            BN=$(git rev-list --count HEAD)
          fi
          echo "Building LuxGram, build number: $BN"
          ./scripts/buildprod.sh --buildNumber "$BN"

      # 8 — Upload artifact ─────────────────────────────────────────────────
      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LuxGram-${{ github.run_number }}
          path: |
            build/artifacts/*.ipa
            build/artifacts/*.dSYM.zip
          if-no-files-found: warn
          retention-days: 30

      # 9 — GitHub Release (on version tags v*.*.*) ─────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/artifacts/*.ipa
          generate_release_notes: true
